name: Android Vulkan Release

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_NDK_VERSION: r27d
  LLAMA_CPP_REF: master
  VULKAN_SDK_VERSION: 1.4.341.0

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build curl unzip zip git python3

      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          add-to-path: false

      - name: Fetch llama.cpp
        run: |
          rm -rf llama.cpp
          git clone --depth 1 --branch "${LLAMA_CPP_REF}" https://github.com/ggml-org/llama.cpp llama.cpp

      - name: Download Vulkan SDK
        run: |
          mkdir -p vulkan-sdk
          curl -L \
            -o vk-sdk.tar.xz \
            "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"
          tar -xf vk-sdk.tar.xz -C vulkan-sdk
          rm vk-sdk.tar.xz

      - name: Build Android Vulkan binaries
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          LLAMA_CPP_DIR: ${{ github.workspace }}/llama.cpp
          VULKAN_SDK: ${{ github.workspace }}/vulkan-sdk/${{ env.VULKAN_SDK_VERSION }}/x86_64
        run: bash ./android-vulkan.sh

      - name: Package release zip
        run: bash scripts/package-android-release.sh builds/android/build-android-vulkan dist llama-android-arm64-vulkan.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-android-arm64-vulkan
          path: dist/llama-android-arm64-vulkan.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/llama-android-arm64-vulkan.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes "Android arm64 Vulkan build for llama-cli and llama-server."
